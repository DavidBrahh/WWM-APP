  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #111827;

      --muted: rgba(255, 255, 255, 0.82);
      --accent: #38bdf8;
      --good: #166534;
      --bad: #991b1b;
      --info: #1d4ed8;
      --warn: #92400e;
      --spy: #6d28d9;
      --blocked: #475569;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 20px;
      margin: 20px auto;
      max-width: 980px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    input, button {
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin: 6px 0;
      font-size: 16px;
    }

    input {
      width: 100%;
      background: #e2e8f0;
      color: #111827;
    }

    button {
      cursor: pointer;
      font-weight: bold;
      background: #e2e8f0;
      color: #111827;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    button:hover:enabled {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .screen {
      display: none;
    }

    .question-title {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .points {
      opacity: 0.85;
      margin-bottom: 16px;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .option {
      background: var(--card-soft);
      border-radius: 12px;
      padding: 14px;
    }

    .button-option {
      color: white;
      text-align: left;
      width: 100%;
      background: var(--card-soft);
    }

    .button-option.selected {
      outline: 2px solid var(--accent);
    }

    .option.correct,
    .button-option.correct {
      background: var(--good);
    }

    .button-option.wrong {
      background: var(--bad);
    }

    .button-option.faded {
      opacity: 0.25;
    }

    .row, .joker-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .row button, .joker-row button {
      flex: 1;
      min-width: 140px;
    }

    ul {
      padding-left: 20px;
    }

    .reveal-box {
      margin-top: 16px;
      padding: 14px;
      background: #0f766e;
      border-radius: 12px;
    }

    .joker-box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
    }

    .joker-box.info {
      background: var(--info);
    }

    .joker-box.risk {
      background: var(--warn);
    }

    .joker-box.spy {
      background: var(--spy);
    }

    .joker-box.blocked {
      background: var(--blocked);
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 700px) {
      .options-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function letterList() {
      return ["A", "B", "C", "D"];
    }

    function randomCode() {
      return Math.random().toString(36).substring(2, 7).toUpperCase();
    }

    function clone(obj) {
      return JSON.parse(JSON.stringify(obj || {}));
    }

    function createPlayerKey() {
      return `p_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach((el) => {
        el.style.display = "none";
      });
      document.getElementById(id).style.display = "block";
    }

    function getQuestions(room) {
      return room.questions || [];
    }

    function getCurrentQuestion(room) {
      const questions = getQuestions(room);
      return questions[(room.currentQuestion || 1) - 1] || null;
    }

    function getPlayerName(room, playerKey) {
      return room?.players?.[playerKey]?.name || playerKey;
    }

    function getSpyState(room) {
      return room.spyState || { phase: "idle", spyPlayer: null, visibleAnswers: {} };
    }

    function getJokerState(room) {
      return room.joker || { claimedBy: null, type: null };
    }

    function getUsedJokers(room) {
      return room.usedJokers || {};
    }

    function getRollbackSnapshots(room) {
      return room.rollbackSnapshots || {};
    }

    function getDisabledOptionsFor5050(question) {
      const wrongLetters = letterList().filter((letter) => letter !== question.answer);
      return wrongLetters.slice(0, 2);
    }

    function getQuestionPoints(question, fallbackLevel = 1) {
      const level = question?.difficulty || fallbackLevel;
      return question?.points || POINTS_BY_LEVEL[level] || 0;
    }

    function normalizeQuestion(question, indexWithinLevel) {
      return {
        ...question,
        id: `${question.difficulty}-${indexWithinLevel}`,
        points: getQuestionPoints(question, question.difficulty)
      };
    }

    function buildRandomGameQuestions() {
      const selected = [];
      const usedQuestionTexts = new Set();

      for (let level = 1; level <= 15; level += 1) {
        const pool = QUESTION_POOL_BY_LEVEL[level] || [];
        const uniquePool = pool.filter((item) => !usedQuestionTexts.has(item.question));

        if (uniquePool.length < 2) {
          throw new Error(`Zu wenig eindeutige Fragen in Level ${level}`);
        }

        const picked = shuffle(uniquePool).slice(0, 2).map((question, idx) => {
          usedQuestionTexts.add(question.question);
          return normalizeQuestion(question, idx + 1);
        });

        selected.push(...picked);
      }

      return selected.map((question, index) => ({
        ...question,
        id: index + 1
      }));
    }

    let state = {
      roomCode: null,
      playerKey: null,
      isHost: false,
      autoRevealForQuestion: null,
      unsubscribeRoom: null
    };

    async function createRoom() {
      try {
        const hostName = document.getElementById("hostName").value.trim() || "Host";
        const roomCode = randomCode();
        const questions = buildRandomGameQuestions();

        const roomData = {
          hostName,
          createdAt: Date.now(),
          started: false,
          currentQuestion: 1,
          reveal: false,
          questions,
          players: {},
          answers: {},
          scores: {},
          joker: { claimedBy: null, type: null },
          spyState: { phase: "idle", spyPlayer: null, visibleAnswers: {} },
          usedJokers: {},
          rollbackSnapshots: {
            1: {
              scoresBeforeQuestion: {},
              usedJokersBeforeQuestion: {}
            }
          }
        };

        await set(ref(db, `rooms/${roomCode}`), roomData);

        state.roomCode = roomCode;
        state.playerKey = null;
        state.isHost = true;
        state.autoRevealForQuestion = null;

        document.getElementById("hostRoomCode").innerText = roomCode;
        document.getElementById("hostJoinLink").value = `${window.location.origin}${window.location.pathname}?room=${roomCode}`;

        bindRoom(roomCode);
        showScreen("hostScreen");
      } catch (error) {
        alert(`Raum konnte nicht erstellt werden: ${error.message}`);
      }
    }

    async function joinRoom() {
      const codeFromUrl = new URLSearchParams(window.location.search).get("room");
      const roomCode = (document.getElementById("joinCode").value || codeFromUrl || "").trim().toUpperCase();
      const playerName = document.getElementById("playerName").value.trim();

      if (!roomCode || !playerName) {
        alert("Bitte Raumcode und Namen eingeben.");
        return;
      }

      const roomSnap = await get(ref(db, `rooms/${roomCode}`));
      if (!roomSnap.exists()) {
        alert("Raum nicht gefunden.");
        return;
      }

      const storedKey = sessionStorage.getItem(`wwm_player_${roomCode}`);
      const playerKey = storedKey || createPlayerKey();

      await update(ref(db, `rooms/${roomCode}/players`), {
        [playerKey]: { name: playerName, joinedAt: Date.now() }
      });

      const scoreSnap = await get(ref(db, `rooms/${roomCode}/scores/${playerKey}`));
      if (!scoreSnap.exists()) {
        await update(ref(db, `rooms/${roomCode}/scores`), { [playerKey]: 0 });
      }

      const usedSnap = await get(ref(db, `rooms/${roomCode}/usedJokers/${playerKey}`));
      if (!usedSnap.exists()) {
        await update(ref(db, `rooms/${roomCode}/usedJokers`), {
          [playerKey]: { fifty: false, risk: false, spy: false }
        });
      }

      sessionStorage.setItem(`wwm_player_${roomCode}`, playerKey);

      state.roomCode = roomCode;
      state.playerKey = playerKey;
      state.isHost = false;
      state.autoRevealForQuestion = null;

      document.getElementById("playerRoomCode").innerText = roomCode;
      document.getElementById("playerDisplayName").innerText = playerName;

      bindRoom(roomCode);
      showScreen("playerScreen");
    }

    async function startGame() {
      if (!state.roomCode) return;
      state.autoRevealForQuestion = null;
      await update(ref(db, `rooms/${state.roomCode}`), {
        started: true,
        reveal: false,
        answers: {}
      });
    }

    async function nextQuestion() {
      const snap = await get(ref(db, `rooms/${state.roomCode}`));
      if (!snap.exists()) return;
      const room = snap.val();

      const next = (room.currentQuestion || 1) + 1;
      if (next > getQuestions(room).length) {
        alert("Keine weiteren Fragen mehr in dieser Lobby.");
        return;
      }

      const rollbackSnapshots = { ...getRollbackSnapshots(room) };
      if (!rollbackSnapshots[next]) {
        rollbackSnapshots[next] = {
          scoresBeforeQuestion: clone(room.scores || {}),
          usedJokersBeforeQuestion: clone(room.usedJokers || {})
        };
      }

      state.autoRevealForQuestion = null;

      await update(ref(db, `rooms/${state.roomCode}`), {
        currentQuestion: next,
        reveal: false,
        answers: {},
        joker: { claimedBy: null, type: null },
        spyState: { phase: "idle", spyPlayer: null, visibleAnswers: {} },
        rollbackSnapshots
      });
    }

    async function previousQuestion() {
      const snap = await get(ref(db, `rooms/${state.roomCode}`));
      if (!snap.exists()) return;
      const room = snap.val();

      const prev = (room.currentQuestion || 1) - 1;
      if (prev < 1) {
        alert("Du bist schon bei der ersten Frage.");
        return;
      }

      const rollback = getRollbackSnapshots(room)[prev];
      state.autoRevealForQuestion = null;

      await update(ref(db, `rooms/${state.roomCode}`), {
        currentQuestion: prev,
        answers: {},
        reveal: false,
        joker: { claimedBy: null, type: null },
        spyState: { phase: "idle", spyPlayer: null, visibleAnswers: {} },
        scores: rollback?.scoresBeforeQuestion || {},
        usedJokers: rollback?.usedJokersBeforeQuestion || {}
      });
    }

    async function revealAnswers() {
      const snap = await get(ref(db, `rooms/${state.roomCode}`));
      if (!snap.exists()) return;
      const room = snap.val();

      if (room.reveal) return;
      const question = getCurrentQuestion(room);
      if (!question) return;

      const answers = room.answers || {};
      const oldScores = room.scores || {};
      const newScores = { ...oldScores };
      const joker = getJokerState(room);
      const usedJokers = clone(room.usedJokers || {});
      const currentQuestionNumber = room.currentQuestion || 1;
      const rollbackSnapshots = { ...getRollbackSnapshots(room) };
      const points = getQuestionPoints(question, currentQuestionNumber);

      if (!rollbackSnapshots[currentQuestionNumber]) {
        rollbackSnapshots[currentQuestionNumber] = {
          scoresBeforeQuestion: clone(oldScores),
          usedJokersBeforeQuestion: clone(usedJokers)
        };
      }

      Object.keys(room.players || {}).forEach((playerKey) => {
        const playerAnswer = answers[playerKey];
        if (!playerAnswer) return;

        const isRiskUser = joker.claimedBy === playerKey && joker.type === "risk";
        const delta = isRiskUser ? points * 2 : points;

        if (playerAnswer === question.answer) {
          newScores[playerKey] = (oldScores[playerKey] || 0) + delta;
        } else if (isRiskUser) {
          newScores[playerKey] = (oldScores[playerKey] || 0) - delta;
        }
      });

      if (joker.claimedBy && joker.type) {
        const playerUsed = usedJokers[joker.claimedBy] || { fifty: false, risk: false, spy: false };
        playerUsed[joker.type] = true;
        usedJokers[joker.claimedBy] = playerUsed;
      }

      state.autoRevealForQuestion = currentQuestionNumber;

      await update(ref(db, `rooms/${state.roomCode}`), {
        reveal: true,
        scores: newScores,
        usedJokers,
        rollbackSnapshots
      });
    }

    async function submitAnswer(letter) {
      if (!state.roomCode || !state.playerKey) return;

      const snap = await get(ref(db, `rooms/${state.roomCode}`));
      if (!snap.exists()) return;
      const room = snap.val();

      if (!room.started || room.reveal) return;

      const spyState = getSpyState(room);
      const joker = getJokerState(room);

      if (joker.type === "spy" && joker.claimedBy === state.playerKey && spyState.phase === "waiting_others") {
        alert("Warte noch kurz, bis die anderen zuerst geantwortet haben.");
        return;
      }

      await update(ref(db, `rooms/${state.roomCode}/answers`), {
        [state.playerKey]: letter
      });
    }

    async function useJoker(type) {
      if (!state.roomCode || !state.playerKey) return;

      const snap = await get(ref(db, `rooms/${state.roomCode}`));
      if (!snap.exists()) return;
      const room = snap.val();

      if (!room.started || room.reveal) return;

      const joker = getJokerState(room);
      if (joker.claimedBy) {
        alert("Der Joker für diese Frage wurde schon von jemand anderem genommen.");
        return;
      }

      const myUsed = getUsedJokers(room)[state.playerKey] || {
        fifty: false,
        risk: false,
        spy: false
      };

      if (myUsed[type]) {
        alert("Diesen Joker hast du in diesem Spiel schon benutzt.");
        return;
      }

      const updates = {
        joker: { claimedBy: state.playerKey, type }
      };

      if (type === "spy") {
        updates.spyState = {
          phase: "waiting_others",
          spyPlayer: state.playerKey,
          visibleAnswers: {}
        };
      }

      await update(ref(db, `rooms/${state.roomCode}`), updates);
    }

    async function maybeAutoReveal(room) {
      if (!state.isHost) return;
      if (!room.started || room.reveal) return;

      const currentQuestionNumber = room.currentQuestion || 1;
      if (state.autoRevealForQuestion === currentQuestionNumber) return;

      const players = Object.keys(room.players || {});
      if (players.length === 0) return;

      const answers = room.answers || {};
      const joker = getJokerState(room);
      const spyState = getSpyState(room);

      if (joker.type !== "spy") {
        const allAnswered = players.every((playerKey) => !!answers[playerKey]);
        if (allAnswered) {
          state.autoRevealForQuestion = currentQuestionNumber;
          await revealAnswers();
        }
        return;
      }

      const spyPlayer = joker.claimedBy;
      const otherPlayers = players.filter((playerKey) => playerKey !== spyPlayer);

      if (spyState.phase === "waiting_others") {
        const othersDone = otherPlayers.every((playerKey) => !!answers[playerKey]);
        if (othersDone) {
          const visibleAnswers = {};
          otherPlayers.forEach((playerKey) => {
            visibleAnswers[playerKey] = answers[playerKey];
          });

          await update(ref(db, `rooms/${state.roomCode}`), {
            spyState: {
              phase: "waiting_spy",
              spyPlayer,
              visibleAnswers
            }
          });
        }
        return;
      }

      if (spyState.phase === "waiting_spy") {
        const spyAnswered = !!answers[spyPlayer];
        if (spyAnswered) {
          state.autoRevealForQuestion = currentQuestionNumber;
          await revealAnswers();
        }
      }
    }

    function renderHost(room) {
      const question = getCurrentQuestion(room);
      const players = room.players || {};
      const answers = room.answers || {};
      const scores = room.scores || {};
      const joker = getJokerState(room);
      const spyState = getSpyState(room);

      const answeredCount = Object.keys(answers).filter((key) => !!answers[key]).length;
      const totalPlayers = Object.keys(players).length;

      document.getElementById("hostPreStartControls").style.display = room.started ? "none" : "flex";
      document.getElementById("hostGameControls").style.display = room.started ? "flex" : "none";
      document.getElementById("hostShareControls").style.display = room.started ? "none" : "flex";

      let jokerText = "Kein Joker aktiv";
      if (joker.claimedBy) {
        jokerText = `${getPlayerName(room, joker.claimedBy)} nutzt ${joker.type.toUpperCase()}`;
      }

      let spyText = "";
      if (joker.type === "spy") {
        if (spyState.phase === "waiting_others") {
          spyText = " • Spy wartet auf die Antworten der anderen";
        } else if (spyState.phase === "waiting_spy") {
          spyText = " • Spy-Spieler darf jetzt antworten";
        }
      }

      document.getElementById("hostStatus").innerText =
        `Frage ${room.currentQuestion} • ${room.started ? "Spiel läuft" : "Noch nicht gestartet"} • ${answeredCount}/${totalPlayers} Antworten • ${jokerText}${spyText}${room.reveal ? " • Antwort aufgelöst" : ""}`;

      if (!question) {
        document.getElementById("hostQuestionBox").innerHTML =
          "<div class='question-title'>Keine Frage verfügbar</div>";
      } else {
        const points = getQuestionPoints(question, room.currentQuestion || 1);
        document.getElementById("hostQuestionBox").innerHTML = `
          <div class="question-title">${question.question}</div>
          <div class="points">${points} Punkt(e) • Schwierigkeit ${question.difficulty}</div>
          <div class="options-grid">
            ${question.options.map((option, index) => {
              const letter = letterList()[index];
              const correct = room.reveal && question.answer === letter ? "correct" : "";
              return `<div class="option ${correct}"><strong>${letter})</strong> ${option}</div>`;
            }).join("")}
          </div>
          ${room.reveal ? `<div class="reveal-box">Richtige Antwort: <strong>${question.answer}) ${question.options[letterList().indexOf(question.answer)]}</strong></div>` : ""}
        `;
      }

      const sortedPlayers = Object.keys(players).sort((a, b) => (scores[b] || 0) - (scores[a] || 0));
      const playerList = sortedPlayers.map((key) => {
        const player = players[key];
        const answer = answers[key] ? `Antwort: ${answers[key]}` : "Noch keine Antwort";
        const score = scores[key] || 0;
        return `<li><strong>${player.name}</strong> — ${answer} — ${score} Punkte</li>`;
      }).join("");

      document.getElementById("hostPlayers").innerHTML = playerList || "<li>Noch keine Spieler</li>";
    }

    function renderPlayer(room) {
      const question = getCurrentQuestion(room);
      const myAnswer = (room.answers || {})[state.playerKey];
      const myScore = (room.scores || {})[state.playerKey] || 0;
      const joker = getJokerState(room);
      const spyState = getSpyState(room);
      const myUsed = getUsedJokers(room)[state.playerKey] || {
        fifty: false,
        risk: false,
        spy: false
      };

      const iAmJokerOwner = joker.claimedBy === state.playerKey;
      const iAmSpy = joker.type === "spy" && iAmJokerOwner;
      const iAmRisk = joker.type === "risk" && iAmJokerOwner;
      const iAm5050 = joker.type === "fifty" && iAmJokerOwner;

      document.getElementById("playerStatus").innerText =
        `Frage ${room.currentQuestion} • ${room.started ? "Spiel läuft" : "Warte auf Host"}`;
      document.getElementById("playerScore").innerText = myScore;

      if (!question) {
        document.getElementById("playerQuestionBox").innerHTML =
          "<div class='question-title'>Keine Frage verfügbar</div>";
        return;
      }

      const disabled5050 = getDisabledOptionsFor5050(question);
      const points = getQuestionPoints(question, room.currentQuestion || 1);

      const buttonsHtml = question.options.map((option, index) => {
        const letter = letterList()[index];
        const selected = myAnswer === letter ? "selected" : "";
        const correct = room.reveal && question.answer === letter ? "correct" : "";
        const wrong = room.reveal && myAnswer === letter && question.answer !== letter ? "wrong" : "";
        const hiddenBy5050 = iAm5050 && disabled5050.includes(letter);
        const isSpyBlocked = iAmSpy && spyState.phase === "waiting_others";
        const disabled = room.reveal || !room.started || hiddenBy5050 || isSpyBlocked;

        return `
          <button class="option button-option ${selected} ${correct} ${wrong} ${hiddenBy5050 ? "faded" : ""}"
            onclick="submitAnswer('${letter}')"
            ${disabled ? "disabled" : ""}>
            <strong>${letter})</strong> ${option}
          </button>
        `;
      }).join("");

      document.getElementById("playerQuestionBox").innerHTML = `
        <div class="question-title">${question.question}</div>
        <div class="points">${points} Punkt(e) • Schwierigkeit ${question.difficulty}</div>
        <div class="options-grid">${buttonsHtml}</div>
      `;

      let jokerInfo = "";
      if (!joker.claimedBy) {
        jokerInfo = `
          <div class="joker-row">
            <button onclick="useJoker('fifty')" ${!room.started || room.reveal || myUsed.fifty ? "disabled" : ""}>50/50 ${myUsed.fifty ? "✓" : ""}</button>
            <button onclick="useJoker('risk')" ${!room.started || room.reveal || myUsed.risk ? "disabled" : ""}>Risk ${myUsed.risk ? "✓" : ""}</button>
            <button onclick="useJoker('spy')" ${!room.started || room.reveal || myUsed.spy ? "disabled" : ""}>Spy ${myUsed.spy ? "✓" : ""}</button>
          </div>
        `;
      } else if (iAmJokerOwner) {
        if (iAm5050) {
          jokerInfo = `<div class="joker-box info">Dein Joker: <strong>50/50</strong> ist aktiv.</div>`;
        }
        if (iAmRisk) {
          jokerInfo = `<div class="joker-box risk">Dein Joker: <strong>Risk</strong> ist aktiv — richtig = doppelte Punkte, falsch = doppelter Abzug.</div>`;
        }
        if (iAmSpy) {
          if (spyState.phase === "waiting_others") {
            jokerInfo = `<div class="joker-box spy">Spy aktiv — warte, bis die anderen geantwortet haben.</div>`;
          } else if (spyState.phase === "waiting_spy") {
            const visible = spyState.visibleAnswers || {};
            const items = Object.keys(visible).map((playerKey) =>
              `<li><strong>${getPlayerName(room, playerKey)}</strong>: ${visible[playerKey]}</li>`
            ).join("");

            jokerInfo = `
              <div class="joker-box spy">
                Spy aktiv — jetzt siehst du die Antworten der anderen:
                <ul>${items || "<li>Noch keine Antworten sichtbar</li>"}</ul>
              </div>
            `;
          }
        }
      } else {
        jokerInfo = `<div class="joker-box blocked">Joker für diese Frage wurde schon von <strong>${getPlayerName(room, joker.claimedBy)}</strong> genommen.</div>`;
      }

      jokerInfo += `
        <div class="joker-box blocked" style="margin-top:10px;">
          Deine Joker: 50/50 ${myUsed.fifty ? "✓ benutzt" : "• frei"} | Risk ${myUsed.risk ? "✓ benutzt" : "• frei"} | Spy ${myUsed.spy ? "✓ benutzt" : "• frei"}
        </div>
      `;

      document.getElementById("playerJokerArea").innerHTML = jokerInfo;
      document.getElementById("playerReveal").innerHTML = room.reveal
        ? `<div class="reveal-box">Richtige Antwort: <strong>${question.answer}) ${question.options[letterList().indexOf(question.answer)]}</strong></div>`
        : "";
    }

    function bindRoom(roomCode) {
      if (typeof state.unsubscribeRoom === "function") {
        state.unsubscribeRoom();
      }

      state.unsubscribeRoom = onValue(ref(db, `rooms/${roomCode}`), async (snap) => {
        if (!snap.exists()) return;
        const room = snap.val();

        if (!room.reveal && state.autoRevealForQuestion !== null && state.autoRevealForQuestion !== room.currentQuestion) {
          state.autoRevealForQuestion = null;
        }

        if (state.isHost) {
          renderHost(room);
          await maybeAutoReveal(room);
        } else {
          renderPlayer(room);
        }
      });
    }

    window.createRoom = createRoom;
    window.joinRoom = joinRoom;
    window.startGame = startGame;
    window.nextQuestion = nextQuestion;
    window.previousQuestion = previousQuestion;
    window.revealAnswers = revealAnswers;
    window.submitAnswer = submitAnswer;
    window.copyJoinLink = copyJoinLink;
    window.shareWhatsApp = shareWhatsApp;
    window.useJoker = useJoker;

    window.addEventListener("DOMContentLoaded", () => {
      const roomFromUrl = new URLSearchParams(window.location.search).get("room");
      if (roomFromUrl) {
        document.getElementById("joinCode").value = roomFromUrl.toUpperCase();
      }
      showScreen("homeScreen");
    });
  </script>
</head>
<body>
  <div id="homeScreen" class="screen">
    <div class="card">
      <h1>WWM Multiplayer</h1>
      <p class="muted">Host erstellt einen Raum, Spieler treten per Code oder Link bei, und die Punktevergabe bleibt sauber stabil.</p>

      <h2>Host erstellen</h2>
      <input id="hostName" placeholder="Dein Name als Host" />
      <button onclick="createRoom()">Raum erstellen</button>

      <h2>Beitreten</h2>
      <input id="joinCode" placeholder="Raumcode" />
      <input id="playerName" placeholder="Dein Name" />
      <button onclick="joinRoom()">Beitreten</button>
    </div>
  </div>

  <div id="hostScreen" class="screen">
    <div class="card">
      <h2>Host Dashboard</h2>
      <p><strong>Raumcode:</strong> <span id="hostRoomCode"></span></p>
      <input id="hostJoinLink" readonly />

      <div id="hostShareControls" class="row">
        <button onclick="copyJoinLink()">Link kopieren</button>
        <button onclick="shareWhatsApp()">Per WhatsApp teilen</button>
      </div>

      <div id="hostPreStartControls" class="row">
        <button onclick="startGame()">Spiel starten</button>
      </div>

      <div id="hostGameControls" class="row" style="display:none;">
        <button onclick="previousQuestion()">Vorherige Frage</button>
        <button onclick="revealAnswers()">Frage auflösen</button>
        <button onclick="nextQuestion()">Nächste Frage</button>
      </div>

      <p id="hostStatus"></p>
      <div id="hostQuestionBox"></div>

      <h3>Spieler</h3>
      <ul id="hostPlayers"></ul>
    </div>
  </div>

  <div id="playerScreen" class="screen">
    <div class="card">
      <h2>Spieleransicht</h2>
      <p><strong>Raum:</strong> <span id="playerRoomCode"></span></p>
      <p><strong>Name:</strong> <span id="playerDisplayName"></span></p>
      <p><strong>Punkte:</strong> <span id="playerScore">0</span></p>
      <p id="playerStatus"></p>

      <div id="playerJokerArea"></div>
      <div id="playerQuestionBox"></div>
      <div id="playerReveal"></div>
    </div>
  </div>
</body>
</html>
